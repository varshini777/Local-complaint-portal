<div class="card card-dashboard">
  <div class="card-header bg-white border-0 pt-4 pb-0">
    <h5 class="card-title mb-0">Complaint Timeline</h5>
  </div>
  <div class="card-body">
    <div class="timeline mt-2">
      {% for item in timeline %}
      <div class="timeline-item">
        <div class="timeline-title">{{ item.action }}</div>
        <div class="timeline-meta">
          <i class="bi bi-clock me-1"></i> {{ item.created_at|datetime }} 
          {% if item.actor_name %}
            &bull; <i class="bi bi-person me-1"></i> {{ item.actor_name }}
          {% endif %}
        </div>
        {% if item.remarks %}
        <div class="timeline-content">
          {{ item.remarks }}
        </div>
        {% endif %}
      </div>
      {% else %}
      <div class="text-center text-muted py-4">
        <i class="bi bi-hourglass-split fs-2 d-block mb-2 text-light"></i>
        No updates have been recorded yet.
      </div>
      {% endfor %}
    </div>
  </div>
</div>
