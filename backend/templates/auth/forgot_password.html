{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm mb-3"><i class="bi bi-arrow-left"></i> Back to Home</a>
    <div class="card p-4">
      <h1 class="h4 mb-3">Forgot Password</h1>
      <form method="post">
        {{ form.hidden_tag() }}
        <div class="mb-3">{{ form.email.label(class="form-label") }}{{ form.email(class="form-control") }}</div>
        {{ form.submit(class="btn btn-primary w-100") }}
      </form>
    </div>
  </div>
</div>
{% endblock %}
